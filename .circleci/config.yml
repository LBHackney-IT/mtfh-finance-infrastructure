version: 2.1

orbs:
  aws_assume_role: lbh-hackit/aws_assume_role@0.1.0

executors:
  docker-python:
    docker:
      - image: cimg/python:3.12
  docker-terraform:
    docker:
      - image: "hashicorp/terraform:light"

references:
  workspace_root: &workspace_root "~"
  attach_workspace: &attach_workspace
    attach_workspace:
      at: *workspace_root

commands:
  assume-role-and-persist-workspace:
    description: "Assumes deployment role and persists credentials across jobs"
    parameters:
      aws-account:
        type: string
    steps:
      - checkout
      - aws_assume_role/assume_role:
          account: <<parameters.aws-account>>
          profile_name: default
          role: "LBH_Circle_CI_Deployment_Role"
      - persist_to_workspace:
          root: *workspace_root
          paths:
            - .aws
  # Import existing resources into Terraform state
  terraform-init-then-import:
    description: "Initializes and imports existing resources into terraform state"
    parameters:
      environment:
        type: string
    steps:
      - *attach_workspace
      - checkout
      - run:
          command: |
            cd ./<<parameters.environment>>/
            terraform get -update=true
            terraform init
          name: get and init
      - run:
          name: import existing resources
          command: |
            cd ./<<parameters.environment>>/
            # Import subnet groups
            terraform import -input=false aws_db_subnet_group.db_subnets housing-finance-db-subnet-production || true
            terraform import -input=false aws_db_subnet_group.mssql_db_subnets housing-finance-mssql-db-subnet-production || true
            terraform import -input=false aws_elasticache_subnet_group.redis_subnets housing-finance-redis-subnet-production || true
            # Import MySQL databases
            terraform import -input=false aws_db_instance.housing-mysql-db housing-finance-db-production || true
            terraform import -input=false aws_db_instance.housing-mysql-db-replica housing-finance-db-production-replica || true
            # Import MSSQL databases
            terraform import -input=false aws_db_instance.mssql-ee housing-finance-sql-db-production-dr || true
            terraform import -input=false aws_db_instance.db_ee_replica housing-finance-sql-db-production-replica || true
            # Import Postgres database from module
            terraform import -input=false module.postgres_db_production.aws_db_subnet_group.db_subnets financedbproduction-db-subnet-production || true
            terraform import -input=false module.postgres_db_production.aws_db_instance.lbh-db uh-mirror-db-production || true
            # Import Civicapay S3 resources
            terraform import -input=false module.civicapay_cashfile_sync.aws_s3_bucket.sftpbucket civica-sftp-cashfile-bucket-dr-production || true
            terraform import -input=false module.civicapay_cashfile_sync.aws_s3_bucket_lifecycle_configuration.lc civica-sftp-cashfile-bucket-dr-production || true
            # Import IAM resources
            terraform import -input=false module.civicapay_cashfile_sync.aws_iam_policy.local_lambda_s3_access_policy arn:aws:iam::851725205572:policy/Civica_sftp_s3_access_policy || true
  # Init then Plan Destroy - preview what will be destroyed
  terraform-init-then-plan-destroy:
    description: "Initializes and plans terraform destroy configuration"
    parameters:
      environment:
        type: string
    steps:
      - *attach_workspace
      - checkout
      - run:
          command: |
            cd ./<<parameters.environment>>/
            terraform get -update=true
            terraform init
          name: get and init
      - run:
          name: refresh state
          command: |
            cd ./<<parameters.environment>>/
            terraform apply -refresh-only -auto-approve
      - run:
          name: plan destroy
          command: |
            cd ./<<parameters.environment>>/
            terraform plan -destroy
  # Used for destroying Terraform resources.
  terraform-init-then-destroy:
    description: "Initializes and destroys terraform configuration"
    parameters:
      environment:
        type: string
    steps:
      - *attach_workspace
      - checkout
      - run:
          command: |
            cd ./<<parameters.environment>>/
            terraform get -update=true
            terraform init
          name: get and init
      - run:
          name: destroy
          command: |
            cd ./<<parameters.environment>>/
            terraform destroy -auto-approve

jobs:
  # Auth:
  assume-role-disaster-recovery:
    executor: docker-python
    steps:
      - assume-role-and-persist-workspace:
          aws-account: $AWS_ACCOUNT_DISASTER_RECOVERY
  import-disaster-recovery-resources:
    executor: docker-terraform
    steps:
      - terraform-init-then-import:
          environment: "production"
  preview-terraform-disaster-recovery-destroy:
    executor: docker-terraform
    steps:
      - terraform-init-then-plan-destroy:
          environment: "production"
  # Infrastructure destruction:
  terraform-init-and-destroy-disaster-recovery:
    executor: docker-terraform
    steps:
      - terraform-init-then-destroy:
          environment: "production"

workflows:
  terraform-destroy-disaster-recovery:
    jobs:
      - assume-role-disaster-recovery:
          context: api-assume-role-disaster-recovery-context
      - import-disaster-recovery-resources:
          requires:
            - assume-role-disaster-recovery
      - preview-terraform-disaster-recovery-destroy:
          requires:
            - import-disaster-recovery-resources
      - permit-disaster-recovery-terraform-destroy:
          type: approval
          requires:
            - preview-terraform-disaster-recovery-destroy
      - terraform-init-and-destroy-disaster-recovery:
          requires:
            - permit-disaster-recovery-terraform-destroy
          filters:
            branches:
              only: disaster-recovery-finance-db
